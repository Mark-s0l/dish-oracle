{% load static %}
<div class="tag-step">
  <form
    method="post"
    action="{% url 'rate_food:save_rate' %}">

    {% csrf_token %}

      {% if tags_form.non_field_errors %}
      <div class="alert alert-danger">{{ tags_form.non_field_errors }}</div>
      {% endif %}

      <div class="tags-grid">
        {% for checkbox in tags_form.taste_tags %}
          <label>{{ checkbox }}</label>
        {% endfor %}
      </div>

      {{ tags_form.taste_tags.errors }}

  <button type="submit">Сохранить</button>

  <button
    type="button"
    hx-get="{% url 'rate_food:add_rate' %}"
    hx-target="#tags-container"
    hx-swap="innerHTML">
    Назад
  </button>

  </form>
  {% include 'partials/message_part.html'%}
</div>
