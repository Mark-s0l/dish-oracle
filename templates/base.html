<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="icon" href="{% static 'icons/favicon.ico' %}" type="image/x-icon">
    {% block extra_css %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
    {% block content %}
    {% endblock %}
    {% include 'partials/message_part.html'%}
    {% block footer %}
<div class="fixed-footer">
  <ul>
    <li>
      <a href="{% url 'food_hub:product_list' %}"
         class="{% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
        <img src="{% static 'icons/home-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="{% url 'search_hub:product_search' %}"
         class="{% if request.resolver_match.url_name == 'product_search' %}active{% endif %}">
        <img src="{% static 'icons/search-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="{% url 'add_food:add_product' %}"
         class="{% if request.resolver_match.url_name == 'add_product' %}active{% endif %}">
        <img src="{% static 'icons/add-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="#"
         class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
        <img src="{% static 'icons/profile-page-icon.svg' %}" alt="">
      </a>
    </li>
  </ul>
</div>
    {% endblock %}
  {% block extra_js %}{% endblock %}
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
