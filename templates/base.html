<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}
    {% endblock %}
    {% block footer %}
      <div class="fixed-footer">
  <ul>
    <li>
      <a href="{% url 'food_hub:product_list' %}"
         class="{% if request.path == '/list/' %}active{% endif %}">
        <img src="{% static 'icons/home-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="{% url 'search_hub:product_search' %}">
        <img src="{% static 'icons/search-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="{% url 'add_food:add_product' %}">
        <img src="{% static 'icons/add-page-icon.svg' %}" alt="">
      </a>
    </li>

    <li>
      <a href="#">
        <img src="{% static 'icons/profile-page-icon.svg' %}" alt="">
      </a>
    </li>
  </ul>
</div>
    {% endblock %}
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
